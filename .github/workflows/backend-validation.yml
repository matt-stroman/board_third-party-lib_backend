name: Backend Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      root_ref:
        description: Optional root repo ref for integration validation
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: backend-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standalone:
    name: Validate Backend Standalone
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout backend branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Materialize standalone shared-package shims
        run: |
          mkdir -p ../packages
          rsync -a ./.ci/root-workspace/packages/migration-contract/ ../packages/migration-contract/
          cp ./.ci/root-workspace/tsconfig.base.json ../tsconfig.base.json

      - name: Install backend dependencies
        working-directory: apps/workers-api
        run: npm install

      - name: Run backend tests
        working-directory: apps/workers-api
        run: npm test

      - name: Run backend typecheck
        working-directory: apps/workers-api
        run: npm run typecheck

  integration:
    name: Validate Backend In Root Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: standalone

    steps:
      - name: Checkout backend branch
        uses: actions/checkout@v4

      - name: Resolve root workspace ref
        id: root_ref
        env:
          INPUT_ROOT_REF: ${{ github.event.inputs.root_ref || '' }}
          GITHUB_HEAD_REF: ${{ github.head_ref || '' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          root_ref = (os.environ.get("INPUT_ROOT_REF") or "").strip()
          reason = "workflow_dispatch input" if root_ref else "default main"

          if not root_ref and os.environ.get("GITHUB_EVENT_NAME") == "pull_request":
              event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
              for label in event.get("pull_request", {}).get("labels", []):
                  name = (label.get("name") or "").strip()
                  if not name.startswith("root-ref:"):
                      continue

                  candidate = name.split(":", 1)[1].strip()
                  if candidate:
                      root_ref = candidate
                      reason = f"pull request label {name}"
                      break

          if not root_ref:
              head_ref = (os.environ.get("GITHUB_HEAD_REF") or "").strip()
              if head_ref:
                  result = subprocess.run(
                      [
                          "git",
                          "ls-remote",
                          "--exit-code",
                          "--heads",
                          "https://github.com/matt-stroman/board-enthusiasts.git",
                          head_ref
                      ],
                      capture_output=True,
                      text=True
                  )
                  if result.returncode == 0:
                      root_ref = head_ref
                      reason = f"matching root branch {head_ref}"

          if not root_ref:
              root_ref = "main"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"root_ref={root_ref}", file=output)
              print(f"reason={reason}", file=output)
          PY

      - name: Summarize integration root ref
        run: |
          echo "Using root ref \`${{ steps.root_ref.outputs.root_ref }}\` (${{ steps.root_ref.outputs.reason }}) for composed backend validation." >> "$GITHUB_STEP_SUMMARY"

      - name: Clone root workspace
        run: |
          git clone --depth 1 --branch "${{ steps.root_ref.outputs.root_ref }}" --recurse-submodules https://github.com/matt-stroman/board-enthusiasts.git root-workspace

      - name: Overlay backend branch contents into root workspace
        run: |
          rm -rf root-workspace/backend
          mkdir -p root-workspace/backend
          rsync -a --delete --exclude '.git/' ./ root-workspace/backend/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workspace dependencies
        working-directory: root-workspace
        run: npm ci

      - name: Run maintained workspace typecheck
        working-directory: root-workspace
        run: npm run typecheck:migration

      - name: Run Workers smoke coverage
        working-directory: root-workspace
        run: python ./scripts/dev.py workers-smoke --start-stack

      - name: Run contract smoke coverage
        working-directory: root-workspace
        run: python ./scripts/dev.py contract-smoke --start-workers

      - name: Run Workers staging dry run
        working-directory: root-workspace
        env:
          CLOUDFLARE_ACCOUNT_ID: ci-dry-run-account
          CLOUDFLARE_API_TOKEN: ci-dry-run-token
          SUPABASE_URL: https://example-project.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ci-dry-run-publishable-key
          SUPABASE_SECRET_KEY: ci-dry-run-secret-key
          SUPABASE_AVATARS_BUCKET: avatars
          SUPABASE_CARD_IMAGES_BUCKET: card-images
          SUPABASE_HERO_IMAGES_BUCKET: hero-images
          SUPABASE_LOGO_IMAGES_BUCKET: logo-images
          TURNSTILE_SECRET_KEY: ci-dry-run-turnstile-secret-key
          BREVO_API_KEY: ci-dry-run-brevo-api-key
          BREVO_SIGNUPS_LIST_ID: 1
          ALLOWED_WEB_ORIGINS: https://boardenthusiasts.com,https://staging.boardenthusiasts.com
          SUPPORT_REPORT_RECIPIENT: support@boardenthusiasts.com
          SUPPORT_REPORT_SENDER_EMAIL: noreply@boardenthusiasts.com
          SUPPORT_REPORT_SENDER_NAME: Board Enthusiasts
        run: python ./scripts/dev.py deploy-staging --dry-run --workers-only
