project_id = "board-enthusiasts-local"

[api]
enabled = true
port = 55421
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 55480
shadow_port = 55420
major_version = 17

[studio]
enabled = true
port = 55423
api_url = "http://127.0.0.1"

[analytics]
enabled = true
port = 55427
vector_port = 55428

[inbucket]
enabled = true
port = 55424
admin_email = "noreply@boardenthusiasts.com"
sender_name = "Board Enthusiasts"

[storage]
enabled = true
file_size_limit = "25MB"

[auth]
enabled = true
site_url = "http://127.0.0.1:4173"
additional_redirect_urls = [
  "http://127.0.0.1:4173",
  "http://127.0.0.1:4173/auth/signin",
  "http://127.0.0.1:4173/auth/signin?mode=recovery",
  "http://localhost:4173",
  "http://localhost:4173/auth/signin",
  "http://localhost:4173/auth/signin?mode=recovery",
  "https://staging.boardenthusiasts.com",
  "https://staging.boardenthusiasts.com/auth/signin",
  "https://staging.boardenthusiasts.com/auth/signin?mode=recovery"
]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true
secure_password_change = true

[auth.email.template.confirmation]
subject = "Welcome to Board Enthusiasts"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Board Enthusiasts password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Board Enthusiasts sign-in link"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.invite]
subject = "You're invited to Board Enthusiasts"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your Board Enthusiasts email change"
content_path = "./supabase/templates/email-change.html"

[auth.email.template.reauthentication]
subject = "Confirm it's you on Board Enthusiasts"
content_path = "./supabase/templates/reauthentication.html"

[auth.email.notification.email_changed]
enabled = true
subject = "Your Board Enthusiasts sign-in email was changed"
content_path = "./templates/email-changed-notification.html"

[auth.email.notification.password_changed]
enabled = true
subject = "Your Board Enthusiasts password was changed"
content_path = "./templates/password-changed-notification.html"

[auth.email.notification.mfa_factor_enrolled]
enabled = true
subject = "A Board Enthusiasts authenticator was added"
content_path = "./templates/mfa-factor-enrolled-notification.html"

[auth.email.notification.mfa_factor_unenrolled]
enabled = true
subject = "A Board Enthusiasts authenticator was removed"
content_path = "./templates/mfa-factor-unenrolled-notification.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.github]
enabled = true
client_id = "env(SUPABASE_AUTH_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GITHUB_CLIENT_SECRET)"

[auth.external.discord]
enabled = true
client_id = "env(SUPABASE_AUTH_DISCORD_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_DISCORD_CLIENT_SECRET)"

[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_CLIENT_SECRET)"
